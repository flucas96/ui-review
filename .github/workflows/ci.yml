name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check workspaces
        run: npm run check
      - name: Run tests
        run: npm test
      - name: Build packages and fixtures
        run: npm run build
      - name: Audit production dependencies
        run: npm audit --omit=dev
